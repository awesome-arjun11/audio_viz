<!doctype html><html lang="en"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Audio Analyzer — Sync Spectrogram</title><style>:root {
      --bg: #0b0d10;
      --panel: #12161c;
      --panel2: #0f1318;
      --text: #e8eef7;
      --muted: #93a4b8;
      --line: #233041;
      --accent: #45d483;
      --blue: #4da3ff;
      --white: #eaeef5;
      --warn: #ff8b8b;
      --red: #d21010;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(1200px 800px at 50% 0%, #111722 0%, var(--bg) 55%);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .app {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px;
    }

    .titlebar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 22px;
      margin: 0;
      letter-spacing: 0.2px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .controls {
      background: linear-gradient(180deg, rgba(18,22,28,0.95), rgba(13,17,23,0.95));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      display: grid;
      grid-template-columns: 1.4fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr;
      gap: 12px;
      align-items: end;
      margin-bottom: 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.28);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    input[type="file"],
    select,
    input[type="number"] {
      width: 100%;
      background: #0c1117;
      color: var(--text);
      border: 1px solid #283547;
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
      font-size: 14px;
    }

    input[type="number"] {
      appearance: textfield;
    }

    input[type="checkbox"] {
      transform: translateY(1px);
    }

    .checkwrap {
      background: #0c1117;
      border: 1px solid #283547;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 42px;
      white-space: nowrap;
      font-size: 14px;
      color: var(--text);
    }

    .btn {
      background: linear-gradient(180deg, #1d2631, #121820);
      color: var(--text);
      border: 1px solid #2d3b50;
      border-radius: 12px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.08s ease, border-color 0.08s ease, opacity 0.2s ease;
    }

    .btn:hover { border-color: #4a5e7d; }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: linear-gradient(180deg, #1f4d35, #143224);
      border-color: #2d7b51;
    }
    .btn.warn {
      background: linear-gradient(180deg, #4a2330, #34161f);
      border-color: #8f3f56;
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .toprow {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .canvasWrap {
      position: relative;
      background: linear-gradient(180deg, rgba(11,13,16,0.9), rgba(9,11,14,0.95));
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 14px 38px rgba(0,0,0,0.35);
    }

    .stack {
      position: relative;
      width: 100%;
      aspect-ratio: 2.45 / 1;
      min-height: 460px;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .legend {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 6px;
      vertical-align: -1px;
    }

    .blue { background: var(--blue); }
    .red { background: var(--red);}
    .white { background: var(--white); }
    .green { background: var(--accent); }


    @media (max-width: 1100px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .stack {
        min-height: 420px;
      }
